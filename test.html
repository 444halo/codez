<!DOCTYPE html>
<html>
  <head>
    <style>
      .three-dots-button {
        color: white;
        width: 40px;
        height: 40px;
        display: block;
        fill: currentColor;
        background-color: rgb(15,15,15);
        border: 0;
        border-radius: 20px;
      }

      .three-dots {
        height: 24px;
        width: 24px;
        place-self: center;
      }

      .three-dots-button:hover {
        background-color: rgb(39,39,39);
      }
    </style>
  </head>
  <body>
      <button class="three-dots-button">
            <div class="three-dots">
              <svg viewBox="0 0 24 24">
                <path d="M12 4a2 2 0 100 4 2 2 0 000-4Zm0 6a2 2 0 100 4 2 2 0 000-4Zm0 6a2 2 0 100 4 2 2 0 000-4Z"></path></svg></div></button>
  </body>
</html>
