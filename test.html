<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        background-color: rgb(157, 209, 209);
      }

      .play-all-button {
        height: 40px;
        width: 120px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 6px;
        background-color: rgb(255, 255, 255);
        border-radius: 20px;
      }

      .play-all-triangle {
        width: 24px;
        height: 24px;
      }

    </style>
  </head>
  <body>
    <div class="play-all-button">
      <div class="play-all-triangle">
        <svg viewBox="0 0 24 24">
          <path d="M5 4.623V19.38a1.5 1.5 0 002.26 1.29L22 12 7.26 3.33A1.5 1.5 0 005 4.623Z"></path>
        </svg>
      </div>
      <div><p class="play-all">Play all</p></div>
    </div>
  </body>
</html>
